<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TravelBook Admin</title>
<meta name="theme-color" content="#083B4C" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
:root{--sea:#1597A5;--deep:#083B4C;--ink:#173A3F;--cream:#FFF9EF;--sand:#FFF4DF;--shadow:0 18px 44px rgba(8,59,76,.16);--line:rgba(21,151,165,.16);--muted:#6D7875;--danger:#B73A3A}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#EAFBFC,#FFF9EF 46%,#F6E5C7);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);padding:20px}.wrap{max-width:920px;margin:auto}.hero{background:linear-gradient(135deg,var(--deep),var(--sea));color:white;border-radius:30px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px}.hero h1{margin:0;font-size:38px;letter-spacing:-.05em}.hero p{margin:8px 0 0;color:rgba(255,255,255,.86);font-weight:750}.card{background:rgba(255,253,247,.96);border:1px solid var(--line);border-radius:26px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}h2{margin:0 0 12px;font-size:26px;letter-spacing:-.035em}label{display:block;font-weight:900;margin:10px 0 6px}input,textarea,select{width:100%;border:1px solid rgba(21,151,165,.22);border-radius:16px;padding:13px 14px;font:inherit;background:white;color:var(--ink)}textarea{min-height:90px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{border:0;background:var(--deep);color:white;border-radius:16px;padding:13px 16px;font-weight:950;font-size:15px;cursor:pointer;margin-top:14px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.light{background:#DDF5F7;color:var(--deep)}.btn.ghost{background:#fff;border:1px solid rgba(21,151,165,.25);color:var(--deep);padding:10px 12px;margin:0}.btn.danger{background:#FFE8E8;color:var(--danger);padding:10px 12px;margin:0}.status{font-weight:900;color:var(--sea);margin-top:10px;min-height:22px}.status.err{color:var(--danger)}.list{display:grid;gap:10px;margin-top:14px}.item{background:white;border:1px solid rgba(21,151,165,.14);border-radius:18px;padding:13px;display:grid;gap:10px}.itemTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.item small{color:var(--muted);font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}.preview{max-width:100%;max-height:320px;object-fit:contain;background:#083B4C;border-radius:18px;display:none;margin-top:10px}.thumb{width:92px;height:70px;border-radius:12px;object-fit:cover;background:#eee}.memoryRow{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:start}.mini{font-size:13px;color:var(--muted);font-weight:800}.note{padding:12px 14px;border-radius:16px;background:#EAFBFC;border:1px solid rgba(21,151,165,.18);font-weight:800;color:var(--deep);margin-bottom:12px}@media(max-width:640px){.row{grid-template-columns:1fr}.hero h1{font-size:32px}.itemTop{display:grid}.actions{justify-content:flex-start}.memoryRow{grid-template-columns:1fr}.thumb{width:100%;height:180px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero"><h1>TravelBook Admin</h1><p>Oppdater Familienytt, dagens program og Minnebok uten GitHub.</p></section>

  <section class="card"><h2>📢 Familienytt</h2><div class="note">Tips til lansering: 🎉 TravelBook Mallorca er offisielt lansert! Følg med her for oppdateringer gjennom uken.</div><form id="newsForm"><input type="hidden" id="newsId"><label>Beskjed</label><input id="newsMessage" placeholder="🏃 Felles løpetur kl. 07:00" required><label>Avsender</label><input id="newsAuthor" placeholder="Trond" value="Trond"><button class="btn" id="newsSubmit">Lagre beskjed</button><button class="btn light" type="button" id="newsCancel" style="display:none">Avbryt redigering</button><div class="status" id="newsStatus"></div></form><div class="list" id="newsList"></div></section>

  <section class="card"><h2>📅 Program</h2><form id="programForm"><input type="hidden" id="programId"><div class="row"><div><label>Tid</label><input id="programTime" placeholder="09:00"></div><div><label>Dag/tekst</label><input id="programDay" placeholder="Lørdag 25. juli"></div></div><label>Tittel</label><input id="programTitle" placeholder="Frokost på terrassen" required><button class="btn" id="programSubmit">Lagre program</button><button class="btn light" type="button" id="programCancel" style="display:none">Avbryt redigering</button><div class="status" id="programStatus"></div></form><div class="list" id="programList"></div></section>

  <section class="card"><h2>📸 Nytt minne</h2><form id="memoryForm"><label>Bilde</label><input id="memoryFile" type="file" accept="image/*" required><img id="memoryPreview" class="preview" alt="Forhåndsvisning"><label>Tekst</label><textarea id="memoryCaption" placeholder="Første kveld på terrassen 🍷"></textarea><div class="row"><div><label>Dag</label><select id="memoryDay"><option>Dag 1 · Ankomst</option><option>Stranddag</option><option>Middag</option><option>Marked</option><option>Villa</option></select></div><div><label>Avsender</label><input id="memoryAuthor" value="Trond"></div></div><button class="btn">Last opp minne</button><div class="status" id="memoryStatus"></div></form><div class="list" id="memoryList"></div></section>

  <p><a class="btn light" href="index.html">Tilbake til TravelBook</a></p>
</div>
<script>
const ready = window.TRAVELBOOK_SUPABASE_URL && window.TRAVELBOOK_SUPABASE_KEY && !window.TRAVELBOOK_SUPABASE_KEY.includes('LIM_INN') && window.supabase;
if(!ready){alert('Lim inn Publishable key i supabase-config.js først.');}
const client = ready ? window.supabase.createClient(window.TRAVELBOOK_SUPABASE_URL, window.TRAVELBOOK_SUPABASE_KEY) : null;
const esc=v=>String(v||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const fmt=d=>d?new Date(d).toLocaleString('no-NO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
function setStatus(id,msg,err=false){const el=document.getElementById(id);el.textContent=msg||'';el.classList.toggle('err',!!err)}

async function refreshNews(){
  if(!client)return;
  const {data,error}=await client.from('family_news').select('*').order('created_at',{ascending:false}).limit(30);
  if(error){setStatus('newsStatus','Feil ved henting: '+error.message,true);return;}
  document.getElementById('newsList').innerHTML=(data||[]).map(x=>`<div class="item"><div class="itemTop"><div><b>${esc(x.message)}</b><br><small>${esc(x.author)} · ${fmt(x.created_at)}</small></div><div class="actions"><button class="btn ghost" type="button" onclick="editNews('${x.id}', '${encodeURIComponent(x.message||'')}', '${encodeURIComponent(x.author||'')}')">✏️ Rediger</button><button class="btn danger" type="button" onclick="deleteNews('${x.id}')">🗑️ Slett</button></div></div></div>`).join('') || '<div class="item"><b>Ingen beskjeder ennå.</b><small>Legg inn første lanseringsbeskjed over.</small></div>';
}
function editNews(id,msg,author){newsId.value=id;newsMessage.value=decodeURIComponent(msg);newsAuthor.value=decodeURIComponent(author)||'Trond';newsSubmit.textContent='Oppdater beskjed';newsCancel.style.display='inline-flex';newsMessage.focus();}
function resetNews(){newsForm.reset();newsId.value='';newsAuthor.value='Trond';newsSubmit.textContent='Lagre beskjed';newsCancel.style.display='none';setStatus('newsStatus','');}
async function deleteNews(id){if(!confirm('Slette denne beskjeden?'))return;const {error}=await client.from('family_news').delete().eq('id',id);setStatus('newsStatus',error?'Feil: '+error.message:'✓ Beskjed slettet',!!error);if(!error)refreshNews();}
newsCancel.addEventListener('click',resetNews);
newsForm.addEventListener('submit',async e=>{e.preventDefault();const payload={message:newsMessage.value.trim(),author:newsAuthor.value.trim()||'Trond'};if(!payload.message)return;let res;if(newsId.value){res=await client.from('family_news').update(payload).eq('id',newsId.value);}else{res=await client.from('family_news').insert(payload);}setStatus('newsStatus',res.error?'Feil: '+res.error.message:(newsId.value?'✓ Beskjed oppdatert':'✓ Beskjed lagret'),!!res.error);if(!res.error){resetNews();refreshNews();}});

async function refreshProgram(){
  if(!client)return;
  const {data,error}=await client.from('program').select('*').order('time',{ascending:true}).limit(50);
  if(error){setStatus('programStatus','Feil ved henting: '+error.message,true);return;}
  document.getElementById('programList').innerHTML=(data||[]).map(x=>`<div class="item"><div class="itemTop"><div><b>${esc(x.time)} ${x.time?'·':''} ${esc(x.title)}</b><br><small>${esc(x.day)}</small></div><div class="actions"><button class="btn ghost" type="button" onclick="editProgram('${x.id}', '${encodeURIComponent(x.time||'')}', '${encodeURIComponent(x.day||'')}', '${encodeURIComponent(x.title||'')}')">✏️ Rediger</button><button class="btn danger" type="button" onclick="deleteProgram('${x.id}')">🗑️ Slett</button></div></div></div>`).join('') || '<div class="item"><b>Ingen programpunkter ennå.</b></div>';
}
function editProgram(id,time,day,title){programId.value=id;programTime.value=decodeURIComponent(time);programDay.value=decodeURIComponent(day);programTitle.value=decodeURIComponent(title);programSubmit.textContent='Oppdater program';programCancel.style.display='inline-flex';programTitle.focus();}
function resetProgram(){programForm.reset();programId.value='';programSubmit.textContent='Lagre program';programCancel.style.display='none';setStatus('programStatus','');}
async function deleteProgram(id){if(!confirm('Slette dette programpunktet?'))return;const {error}=await client.from('program').delete().eq('id',id);setStatus('programStatus',error?'Feil: '+error.message:'✓ Programpunkt slettet',!!error);if(!error)refreshProgram();}
programCancel.addEventListener('click',resetProgram);
programForm.addEventListener('submit',async e=>{e.preventDefault();const payload={time:programTime.value.trim(),title:programTitle.value.trim(),day:programDay.value.trim()};if(!payload.title)return;let res;if(programId.value){res=await client.from('program').update(payload).eq('id',programId.value);}else{res=await client.from('program').insert(payload);}setStatus('programStatus',res.error?'Feil: '+res.error.message:(programId.value?'✓ Program oppdatert':'✓ Program lagret'),!!res.error);if(!res.error){resetProgram();refreshProgram();}});

async function refreshMemories(){
  if(!client)return;
  const {data,error}=await client.from('memories').select('*').order('created_at',{ascending:false}).limit(12);
  if(error){setStatus('memoryStatus','Feil ved henting: '+error.message,true);return;}
  document.getElementById('memoryList').innerHTML=(data||[]).map(x=>`<div class="item"><div class="memoryRow">${x.image_url?`<img class="thumb" src="${esc(x.image_url)}" alt="">`:''}<div><b>${esc(x.day)}</b><br><small>${esc(x.caption)} · ${esc(x.author)} · ${fmt(x.created_at)}</small><div class="actions" style="margin-top:10px"><button class="btn danger" type="button" onclick="deleteMemory('${x.id}', '${encodeURIComponent(x.image_url||'')}')">🗑️ Slett</button></div></div></div></div>`).join('') || '<div class="item"><b>Ingen minner ennå.</b></div>';
}
async function deleteMemory(id,imageUrl){if(!confirm('Slette dette minnet?'))return;const {error}=await client.from('memories').delete().eq('id',id);setStatus('memoryStatus',error?'Feil: '+error.message:'✓ Minne slettet',!!error);if(!error)refreshMemories();}
memoryFile.addEventListener('change',()=>{const f=memoryFile.files[0];if(!f)return;memoryPreview.src=URL.createObjectURL(f);memoryPreview.style.display='block';});
memoryForm.addEventListener('submit',async e=>{e.preventDefault();const status=document.getElementById('memoryStatus');const f=memoryFile.files[0];if(!f)return;const ext=(f.name.split('.').pop()||'jpg').toLowerCase();const name=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;const up=await client.storage.from('memories').upload(name,f,{cacheControl:'3600',upsert:false});if(up.error){setStatus('memoryStatus','Feil: '+up.error.message,true);return;}const {data:pub}=client.storage.from('memories').getPublicUrl(name);const ins=await client.from('memories').insert({image_url:pub.publicUrl,caption:memoryCaption.value,day:memoryDay.value,author:memoryAuthor.value});setStatus('memoryStatus',ins.error?'Feil: '+ins.error.message:'✓ Minne delt',!!ins.error);if(!ins.error){memoryForm.reset();memoryAuthor.value='Trond';memoryPreview.style.display='none';refreshMemories();}});
refreshNews();refreshProgram();refreshMemories();
</script>
</body>
</html>
